<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#F97316" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#heroGrad)" filter="url(#shadow)"/>
  <!-- Brain-like network nodes -->
  <circle cx="40" cy="45" r="5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="60" cy="35" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="80" cy="45" r="5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="45" cy="65" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="75" cy="65" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="60" cy="55" r="6" fill="white"/>
  <!-- Connection lines -->
  <line x1="40" y1="45" x2="60" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="80" y1="45" x2="60" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="60" y1="35" x2="60" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="45" y1="65" x2="60" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="75" y1="65" x2="60" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="40" y1="45" x2="60" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="80" y1="45" x2="60" y2="35" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="40" y1="45" x2="45" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="80" y1="45" x2="75" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Text -->
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">BB</text>
</svg>
